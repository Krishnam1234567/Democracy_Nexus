steps:
# Install dependencies
- name: 'node:20'
  entrypoint: 'npm'
  args: ['install']

# Build the project
- name: 'node:20'
  entrypoint: 'npm'
  args: ['run', 'build']

# Deploy to Firebase Hosting
- name: 'gcr.io/trim-surfer-450513-n9/firebase'
  entrypoint: 'npx'
  args: ['firebase-tools', 'deploy', '--project', 'trim-surfer-450513-n9', '--only', 'hosting']
